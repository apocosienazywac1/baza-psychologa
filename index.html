<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baza wiedzy: Ustawa o zawodzie psychologa</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #b8e0d2; margin: 0; padding: 0; }
    h1 { font-size: 2em; margin: 20px 0; color: #1b3d2d; }
    .center-image { width: 300px; max-width: 90%; margin-bottom: 30px; }
    #bot-container { width: 400px; max-width: 90%; height: 500px; margin: 0 auto 50px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
  </style>
</head>
<body>

  <h1>Baza wiedzy: Ustawa o zawodzie psychologa</h1>

  <img src="Gemini_Generated_Image_4ute9x4ute9x4ute.png" alt="Książka" class="center-image">

  <div id="bot-container"></div>

  <!-- Botpress Webchat -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

  <script>
    window.addEventListener('load', function() {
      if (window.botpressWebChat) {
        window.botpressWebChat.init({
          container: '#bot-container',
          botName: 'Specjalistka Agnieszka',
          webchatConfig: 'https://files.bpcontent.cloud/2026/04/01/09/20260401090115-3JZ17WG4.json',
          showConversationsButton: false,
          enableReset: true,
          enableWelcomeMessage: true
        });
      } else {
        console.error("Botpress WebChat nie załadował się!");
      }
    });
  </script>

</body>
</html>
