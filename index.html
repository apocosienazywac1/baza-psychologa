<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baza wiedzy: Ustawa o zawodzie psychologa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Bluszcz po bokach -->
  <img src="Gemini_Generated_Image_kk4v00kk4v00kk4v.png" alt="Bluszcz lewy" class="ivy left">
  <img src="Gemini_Generated_Image_kk4v00kk4v00kk4v.png" alt="Bluszcz prawy" class="ivy right">

  <!-- Nagłówek -->
  <h1>Baza wiedzy: Ustawa o zawodzie psychologa</h1>

  <!-- Grafika książki -->
  <div class="center-image-container">
    <img src="Gemini_Generated_Image_4ute9x4ute9x4ute.png" alt="Książka na stole" class="center-image">
  </div>

  <!-- Kontener na bota -->
  <div id="bot-container"></div>

  <!-- Skrypt do dynamicznego iframe z resetem sesji -->
  <script>
    window.addEventListener('load', () => {
      const container = document.getElementById('bot-container');
      container.innerHTML = ''; // usuwa poprzedni iframe (jeśli jest)

      const iframe = document.createElement('iframe');
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.border = 'none';
      iframe.style.borderRadius = '15px';
      iframe.style.boxShadow = '0 4px 15px rgba(0,0,0,0.2)';

      // Tworzymy nową sesję przy każdym ładowaniu
      const sessionId = 'session-' + Date.now();
      iframe.src = 'https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/04/01/09/20260401090115-3JZ17WG4.json&sessionId=' + sessionId;

      container.appendChild(iframe);
    });
  </script>

</body>
</html>
