<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baza wiedzy: Ustawa o zawodzie psychologa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Bluszcz po bokach -->
  <img src="Gemini_Generated_Image_kk4v00kk4v00kk4v.png" alt="Bluszcz lewy" class="ivy left">
  <img src="Gemini_Generated_Image_kk4v00kk4v00kk4v.png" alt="Bluszcz prawy" class="ivy right">

  <!-- Nagłówek -->
  <h1 class="header-box">Baza wiedzy: Ustawa o zawodzie psychologa</h1>

  <!-- Grafika -->
  <div class="center-image-container">
    <img src="Gemini_Generated_Image_4ute9x4ute9x4ute.png" alt="Książka na stole" class="center-image">
  </div>

  <!-- Kontener bota -->
  <div id="bot-container"></div>

  <!-- BOTPRESS (STABILNA WERSJA) -->
  <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>

  <script>
    window.addEventListener('load', function () {
      console.log("Start ładowania Botpress...");

      if (window.botpressWebChat) {
        window.botpressWebChat.init({
          botId: 'IFCO3FKO',
          clientId: 'IFCO3FKO',
          hostUrl: 'https://cdn.botpress.cloud/webchat/v1',
          messagingUrl: 'https://messaging.botpress.cloud',
          container: '#bot-container',
          botName: 'Specjalistka Agnieszka',
          showConversationsButton: false
        });

        console.log("Botpress uruchomiony");
      } else {
        console.error("Botpress się NIE załadował");
      }
    });
  </script>

</body>
</html>
